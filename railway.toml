[build]
builder = "nixpacks"
buildCommand = "pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r backend/requirements.txt"

[deploy]
startCommand = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
